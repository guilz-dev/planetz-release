name: Release desktop (macOS)

# Disabled on private planetz — DMG releases are published from guilz-dev/planetz-release.
# Manual runs only; do not re-enable tag triggers here (avoids duplicate releases).
on:
  workflow_dispatch:

jobs:
  release-mac:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify tag matches desktop package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./apps/desktop/package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "tag/package.json mismatch: tag v$TAG vs apps/desktop package $PKG"
            exit 1
          fi

      - name: Verify release secrets
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "missing required secret: $name"
              exit 1
            fi
          done

      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Cache orbit node_modules
        uses: actions/cache@v4
        with:
          path: third_party/orbit/node_modules
          key: orbit-${{ hashFiles('third_party/orbit/package-lock.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.CSC_LINK }}
          p12-password: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Build macOS DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/package-desktop-mac.sh

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            apps/desktop/release/**/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
