name: CI

on:
  push:
    branches: [develop, main]
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - run: bash scripts/check-gitleaks.sh
        env:
          GITLEAKS_VERSION: 8.30.1

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.3
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild electron
      - run: pnpm verify:node
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm prepare:bundled-orbit
      - run: pnpm test
      - run: pnpm check:security-dom
      - run: pnpm check:skin
      # moderate+ until high advisories are cleared; use `pnpm audit:ci:strict` locally
      - run: pnpm audit:ci
        continue-on-error: true
        env:
          PLANETZ_AUDIT_LEVEL: moderate
